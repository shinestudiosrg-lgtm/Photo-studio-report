<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Shine Photo Studio Report</title>

<style>

:root{

  --bg1:#0f172a;
  --bg2:#1e293b;

  --card:rgba(255,255,255,.12);
  --border:rgba(255,255,255,.12);

  --text:#f8fafc;
  --muted:#cbd5e1;

  --input:#ffffff;
  --inputText:#0f172a;

  --pink:#ff4ecd;
  --blue:#3b82f6;
  --yellow:#facc15;

  --shadow:0 20px 50px rgba(0,0,0,.35);

  --report:#020617;

}

body.light{

  --bg1:#f1f5f9;
  --bg2:#e2e8f0;

  --card:rgba(255,255,255,.85);
  --border:rgba(0,0,0,.08);

  --text:#0f172a;
  --muted:#475569;

  --input:#ffffff;
  --inputText:#0f172a;

  --report:#ffffff;

  --shadow:0 10px 30px rgba(0,0,0,.08);

}

*{
  box-sizing:border-box;
}

body{

  margin:0;
  min-height:100vh;

  font-family:Inter,Segoe UI,sans-serif;

  color:var(--text);

  background:
  radial-gradient(circle at top left, rgba(255,78,205,.18), transparent 28%),
  radial-gradient(circle at top right, rgba(59,130,246,.18), transparent 30%),
  radial-gradient(circle at bottom center, rgba(250,204,21,.15), transparent 28%),
  linear-gradient(135deg,var(--bg1),var(--bg2));

  padding:24px;

  transition:.3s;

}

.wrap{

  width:100%;
  max-width:1200px;

  margin:auto;

  display:grid;
  grid-template-columns:1fr 1fr;

  gap:22px;

}

.panel{

  background:var(--card);

  border:1px solid var(--border);

  backdrop-filter:blur(16px);

  border-radius:28px;

  box-shadow:var(--shadow);

}

.left{
  padding:24px;
}

.right{

  padding:22px;

  position:sticky;
  top:20px;

  height:fit-content;

}

.top{

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:16px;

  margin-bottom:22px;

}

.brand{

  display:flex;
  align-items:center;
  gap:14px;

}

.logo{

  width:60px;
  height:60px;

  border-radius:18px;

  display:grid;
  place-items:center;

  font-size:28px;

  background:
  linear-gradient(
  135deg,
  var(--pink),
  var(--blue),
  var(--yellow)
  );

}

h1{
  margin:0;
  font-size:28px;
}

.sub{

  margin-top:5px;

  color:var(--muted);

  font-size:14px;

}

.top-right{

  display:flex;
  flex-direction:column;
  gap:10px;

}

.date{

  background:rgba(255,255,255,.08);

  border:1px solid var(--border);

  padding:12px 14px;

  border-radius:16px;

  font-size:13px;

}

.theme-btn{

  border:none;

  padding:12px 14px;

  border-radius:14px;

  font-weight:700;

  cursor:pointer;

  background:
  linear-gradient(135deg,var(--blue),#7ab1ff);

  color:white;

}

.stats{

  display:grid;
  grid-template-columns:repeat(4,1fr);

  gap:14px;

  margin-bottom:22px;

}

.stat{

  background:rgba(255,255,255,.08);

  border:1px solid var(--border);

  border-radius:18px;

  padding:16px;

}

.stat .label{

  font-size:12px;

  color:var(--muted);

  margin-bottom:8px;

}

.stat .value{

  font-size:18px;
  font-weight:800;

}

.grid{

  display:grid;
  grid-template-columns:repeat(2,1fr);

  gap:16px;

}

.field{

  display:flex;
  flex-direction:column;

  gap:8px;

}

.field.full{
  grid-column:1 / -1;
}

label{

  font-size:13px;
  font-weight:700;

}

input,
select{

  width:100%;

  border:none;
  outline:none;

  padding:14px 16px;

  border-radius:16px;

  background:var(--input);

  color:var(--inputText);

  font-size:14px;

}

.input-wrap{
  position:relative;
}

.prefix{

  position:absolute;

  left:14px;
  top:50%;

  transform:translateY(-50%);

  color:#64748b;

}

.money{
  padding-left:42px;
}

.actions{

  display:grid;
  grid-template-columns:repeat(3,1fr);

  gap:12px;

  margin-top:22px;

}

button{

  border:none;

  border-radius:16px;

  padding:14px;

  font-weight:800;

  cursor:pointer;

  transition:.2s;

}

button:hover{
  transform:translateY(-2px);
}

.generate{

  background:
  linear-gradient(135deg,var(--pink),#ff82db);

  color:white;

}

.copy{

  background:
  linear-gradient(135deg,var(--blue),#72a8ff);

  color:white;

}

.wa{

  background:
  linear-gradient(135deg,var(--yellow),#fde68a);

  color:#111827;

}

.preview-top{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:14px;

}

.preview-top h2{
  margin:0;
}

.pill{

  background:rgba(74,222,128,.14);

  color:#86efac;

  padding:8px 12px;

  border-radius:999px;

  font-size:12px;
  font-weight:800;

}

.report{

  background:var(--report);

  border:1px solid var(--border);

  border-radius:24px;

  padding:18px;

  min-height:460px;

  display:flex;
  flex-direction:column;
  gap:14px;

}

.report-head{

  display:flex;
  justify-content:space-between;
  align-items:center;

  border-bottom:1px solid var(--border);

  padding-bottom:12px;

}

.report-title{

  font-size:18px;
  font-weight:800;

}

.report-sub{

  font-size:12px;

  color:var(--muted);

}

pre{

  margin:0;

  flex:1;

  white-space:pre-wrap;
  word-break:break-word;

  font-family:Consolas,monospace;

  font-size:13px;
  line-height:1.7;

  color:#22c55e;

}

.footer-grid{

  display:grid;
  grid-template-columns:repeat(3,1fr);

  gap:12px;

}

.mini{

  background:rgba(255,255,255,.05);

  border:1px solid var(--border);

  border-radius:18px;

  padding:14px;

}

.mini .small{

  font-size:12px;

  color:var(--muted);

  margin-bottom:6px;

}

.mini .big{

  font-size:18px;
  font-weight:800;

}

.toast{

  position:fixed;

  left:50%;
  bottom:24px;

  transform:translateX(-50%);

  background:#0f172a;

  color:white;

  padding:12px 16px;

  border-radius:14px;

  opacity:0;

  transition:.25s;

}

.toast.show{
  opacity:1;
}

@media(max-width:950px){

  .wrap{
    grid-template-columns:1fr;
  }

  .right{
    position:static;
  }

}

@media(max-width:640px){

  body{
    padding:14px;
  }

  .stats,
  .grid,
  .actions,
  .footer-grid{
    grid-template-columns:1fr;
  }

  .top{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>
</head>

<body>

<div class="wrap">

<section class="panel left">

<div class="top">

<div class="brand">

<div class="logo">✨</div>

<div>

<h1>Shine Photo Studio</h1>

<div class="sub">
Premium Report System
</div>

</div>

</div>

<div class="top-right">

<div class="date" id="liveDate"></div>

<button
class="theme-btn"
onclick="toggleTheme()"
>
🌙 Light / Dark
</button>

</div>

</div>

<div class="stats">

<div class="stat">
<div class="label">Cash</div>
<div class="value" id="statCash">Rp 0</div>
</div>

<div class="stat">
<div class="label">QRIS</div>
<div class="value" id="statQris">Rp 0</div>
</div>

<div class="stat">
<div class="label">Total</div>
<div class="value" id="statTotal">Rp 0</div>
</div>

<div class="stat">
<div class="label">Session</div>
<div class="value" id="statSession">0</div>
</div>

</div>

<div class="grid">

<div class="field">

<label>Shift</label>

<select id="shiftType">

<option value="">Pilih Shift</option>
<option value="Siang">Siang</option>
<option value="Malam">Malam</option>

</select>

</div>

<div class="field">

<label>Nama Petugas</label>

<select id="petugas">

<option value="">Pilih Petugas</option>

<option value="Wahdah">Wahdah</option>
<option value="Ikoh">Ikoh</option>
<option value="Nazwa">Nazwa</option>
<option value="Asya">Asya</option>
<option value="Anisa">Anisa</option>

</select>

</div>

<div class="field">

<label>Cash</label>

<div class="input-wrap">

<span class="prefix">Rp</span>

<input
type="number"
id="cash"
class="money"
/>

</div>

</div>

<div class="field">

<label>QRIS</label>

<div class="input-wrap">

<span class="prefix">Rp</span>

<input
type="number"
id="qris"
class="money"
/>

</div>

</div>

<div class="field">

<label>Photo Box</label>

<input
type="number"
id="photobox"
/>

</div>

<div class="field">

<label>Photo Studio</label>

<input
type="number"
id="studio"
/>

</div>

<div class="field">

<label>Kertas Terpakai</label>

<input
type="number"
id="kertas"
/>

</div>

<div class="field">

<label>Sisa Kertas</label>

<input
type="number"
id="sisa"
/>

</div>

<div class="field full">

<label>Catatan</label>

<input
type="text"
id="catatan"
placeholder="Opsional..."
/>

</div>

</div>

<div class="actions">

<button
class="generate"
onclick="generateReport()"
>
Generate
</button>

<button
class="copy"
onclick="copyText()"
>
Copy
</button>

<button
class="wa"
onclick="sendWA()"
>
WhatsApp
</button>

</div>

</section>

<aside class="panel right">

<div class="preview-top">

<h2>Preview Report</h2>

<div class="pill">
Siap Kirim
</div>

</div>

<div class="report">

<div class="report-head">

<div>

<div class="report-title">
Laporan Harian
</div>

<div class="report-sub">
Shine Photo Studio
</div>

</div>

<div style="font-size:24px">
📋
</div>

</div>

<pre id="output">✨ SHINE PHOTO STUDIO - REPORT HARIAN

Isi data lalu klik Generate.</pre>

<div class="footer-grid">

<div class="mini">

<div class="small">
Total Pendapatan
</div>

<div class="big" id="miniTotal">
Rp 0
</div>

</div>

<div class="mini">

<div class="small">
Kertas
</div>

<div class="big" id="miniPaper">
0 / 0
</div>

</div>

<div class="mini">

<div class="small">
Session
</div>

<div class="big" id="miniSession">
0
</div>

</div>

</div>

</div>

</aside>

</div>

<div class="toast" id="toast"></div>

<script>

function rupiah(n){

  return 'Rp ' +
  Number(n || 0)
  .toLocaleString('id-ID');

}

function updateDate(){

  const now = new Date();

  const tanggal =
  now.toLocaleDateString(
  'id-ID',
  {
    weekday:'long',
    day:'numeric',
    month:'long',
    year:'numeric'
  });

  const jam =
  now.toLocaleTimeString(
  'id-ID',
  {
    hour:'2-digit',
    minute:'2-digit'
  });

  document.getElementById('liveDate')
  .innerHTML =
  `${tanggal}<br>${jam} WIB`;

}

function showToast(msg){

  const toast =
  document.getElementById('toast');

  toast.textContent = msg;

  toast.classList.add('show');

  clearTimeout(window.toastTimer);

  window.toastTimer =
  setTimeout(() => {

    toast.classList.remove('show');

  },2200);

}

function updateStats(){

  const cash =
  +document.getElementById('cash').value || 0;

  const qris =
  +document.getElementById('qris').value || 0;

  const photobox =
  +document.getElementById('photobox').value || 0;

  const studio =
  +document.getElementById('studio').value || 0;

  const total =
  cash + qris;

  const session =
  photobox + studio;

  const kertas =
  document.getElementById('kertas').value || 0;

  const sisa =
  document.getElementById('sisa').value || 0;

  document.getElementById('statCash')
  .textContent = rupiah(cash);

  document.getElementById('statQris')
  .textContent = rupiah(qris);

  document.getElementById('statTotal')
  .textContent = rupiah(total);

  document.getElementById('statSession')
  .textContent = session;

  document.getElementById('miniTotal')
  .textContent = rupiah(total);

  document.getElementById('miniPaper')
  .textContent =
  `${kertas} / ${sisa}`;

  document.getElementById('miniSession')
  .textContent =
  session + ' Session';

}

function generateReport(){

  const shift =
  document.getElementById('shiftType').value || '-';

  const petugas =
  document.getElementById('petugas').value || '-';

  const cash =
  +document.getElementById('cash').value || 0;

  const qris =
  +document.getElementById('qris').value || 0;

  const photobox =
  +document.getElementById('photobox').value || 0;

  const studio =
  +document.getElementById('studio').value || 0;

  const totalSession =
  photobox + studio;

  const kertas =
  document.getElementById('kertas').value || 0;

  const sisa =
  document.getElementById('sisa').value || 0;

  const catatan =
  document.getElementById('catatan').value || '-';

  const total =
  cash + qris;

  const tanggal =
  new Date()
  .toLocaleDateString(
  'id-ID',
  {
    day:'numeric',
    month:'long',
    year:'numeric'
  });

  const report =
`✨ SHINE PHOTO STUDIO - REPORT HARIAN

Tanggal : ${tanggal}
Petugas : ${petugas}
Shift   : ${shift}

Cash    : ${rupiah(cash)}
QRIS    : ${rupiah(qris)}

Photo Box       : ${photobox}
Photo Studio    : ${studio}
Total Session   : ${totalSession}

Kertas terpakai : ${kertas}
Sisa kertas     : ${sisa}

Total pendapatan : ${rupiah(total)}

Catatan : ${catatan}

Terima kasih 🙏`;

  document.getElementById('output')
  .textContent = report;

  updateStats();

  showToast('Report berhasil dibuat');

}

async function copyText(){

  const text =
  document.getElementById('output')
  .textContent;

  await navigator.clipboard
  .writeText(text);

  showToast('Report berhasil dicopy');

}

function sendWA(){

  const text =
  document.getElementById('output')
  .textContent;

  const url =
  `https://wa.me/?text=${encodeURIComponent(text)}`;

  window.open(url,'_blank');

}

function toggleTheme(){

  document.body.classList.toggle('light');

}

[
'cash',
'qris',
'photobox',
'studio',
'kertas',
'sisa'
].forEach(id => {

  document
  .getElementById(id)
  .addEventListener('input', updateStats);

});

updateDate();
updateStats();

setInterval(updateDate,30000);

</script>

</body>
</html>
