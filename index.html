<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shine Photo Studio Report</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg1: #0f172a;
  --bg2: #1e1b4b;
  --bg3: #312e81;

  --card: rgba(255,255,255,.12);
  --card2: rgba(255,255,255,.08);
  --border: rgba(255,255,255,.16);

  --text: #f8fafc;
  --muted: #cbd5e1;

  --input: rgba(255,255,255,.95);
  --inputText: #0f172a;

  --pink: #ff4ecd;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --yellow: #facc15;
  --green: #22c55e;

  --report: rgba(2,6,23,.88);
  --shadow: 0 25px 70px rgba(0,0,0,.35);
}

body.light {
  --bg1: #fff7ed;
  --bg2: #fce7f3;
  --bg3: #dbeafe;

  --card: rgba(255,255,255,.82);
  --card2: rgba(255,255,255,.62);
  --border: rgba(15,23,42,.09);

  --text: #0f172a;
  --muted: #64748b;

  --input: #ffffff;
  --inputText: #0f172a;

  --report: rgba(255,255,255,.92);
  --shadow: 0 25px 70px rgba(148,163,184,.35);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
  overflow-x: hidden;
  padding: 22px;
}

.bg {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: -1;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  opacity: .45;
  animation: float 12s ease-in-out infinite;
}

.blob1 {
  width: 320px;
  height: 320px;
  background: var(--pink);
  top: -90px;
  left: -80px;
}

.blob2 {
  width: 380px;
  height: 380px;
  background: var(--blue);
  top: 140px;
  right: -130px;
  animation-delay: 2s;
}

.blob3 {
  width: 300px;
  height: 300px;
  background: var(--yellow);
  bottom: -90px;
  left: 38%;
  animation-delay: 4s;
}

@keyframes float {
  0%, 100% {
    transform: translateY(0) scale(1);
  }

  50% {
    transform: translateY(-35px) scale(1.08);
  }
}

.wrap {
  width: 100%;
  max-width: 1220px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr .95fr;
  gap: 22px;
}

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  backdrop-filter: blur(22px);
  border-radius: 30px;
  box-shadow: var(--shadow);
}

.left {
  padding: 24px;
}

.right {
  padding: 22px;
  position: sticky;
  top: 20px;
  height: fit-content;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  margin-bottom: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 66px;
  height: 66px;
  border-radius: 24px;
  display: grid;
  place-items: center;
  font-size: 31px;
  background: linear-gradient(135deg, var(--pink), var(--blue), var(--yellow));
  box-shadow: 0 16px 35px rgba(0,0,0,.25);
}

h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: -.5px;
}

.sub {
  color: var(--muted);
  margin-top: 5px;
  font-size: 14px;
}

.top-right {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.date {
  padding: 12px 14px;
  border-radius: 18px;
  background: var(--card2);
  border: 1px solid var(--border);
  font-size: 13px;
  text-align: right;
  color: var(--muted);
}

.theme-btn {
  border: none;
  border-radius: 16px;
  padding: 12px 14px;
  font-weight: 800;
  cursor: pointer;
  background: linear-gradient(135deg, var(--blue), #7ab1ff);
  color: white;
  transition: .25s;
}

.theme-btn:hover,
button:hover {
  transform: translateY(-2px);
}

.stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 14px;
  margin-bottom: 22px;
}

.stat {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}

.stat::after {
  content: "";
  position: absolute;
  width: 80px;
  height: 80px;
  right: -30px;
  bottom: -35px;
  background: linear-gradient(135deg, var(--pink), var(--blue));
  border-radius: 50%;
  opacity: .25;
}

.stat .label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.stat .value {
  font-size: 18px;
  font-weight: 800;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 16px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.field.full {
  grid-column: 1 / -1;
}

label {
  font-size: 13px;
  font-weight: 800;
}

input,
select {
  width: 100%;
  border: none;
  outline: none;
  padding: 15px 16px;
  border-radius: 18px;
  background: var(--input);
  color: var(--inputText);
  font-size: 14px;
}

input:focus,
select:focus {
  box-shadow: 0 0 0 3px rgba(59,130,246,.25);
}

.input-wrap {
  position: relative;
}

.prefix {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #64748b;
  font-weight: 700;
}

.money {
  padding-left: 44px;
}

.check-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
}

.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card2);
  border: 1px solid var(--border);
  padding: 14px;
  border-radius: 18px;
  cursor: pointer;
  transition: .25s;
}

.check-item:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,.16);
}

.check-item input {
  width: 18px;
  height: 18px;
  accent-color: #ff4ecd;
}

.actions {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-top: 24px;
}

button {
  border: none;
  border-radius: 18px;
  padding: 15px;
  font-weight: 900;
  cursor: pointer;
  transition: .25s;
}

.generate {
  background: linear-gradient(135deg, var(--pink), #ff82db);
  color: white;
}

.copy {
  background: linear-gradient(135deg, var(--blue), #72a8ff);
  color: white;
}

.wa {
  background: linear-gradient(135deg, var(--yellow), #fde68a);
  color: #111827;
}

.reset {
  background: rgba(255,255,255,.14);
  color: var(--text);
  border: 1px solid var(--border);
}

.preview-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.preview-top h2 {
  margin: 0;
}

.pill {
  background: rgba(74,222,128,.16);
  color: #86efac;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
}

.report {
  background: var(--report);
  border: 1px solid var(--border);
  border-radius: 26px;
  padding: 18px;
  min-height: 460px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
}

.report-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}

.report-title {
  font-size: 18px;
  font-weight: 900;
}

.report-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

pre {
  margin: 0;
  white-space: pre-wrap;
  font-family: Consolas, monospace;
  line-height: 1.75;
  color: #22c55e;
  min-height: 300px;
  font-size: 14px;
}

body.light pre {
  color: #15803d;
}

.footer-grid {
  margin-top: 14px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
}

.mini {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 14px;
}

.mini .small {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

.mini .big {
  font-size: 18px;
  font-weight: 900;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%) translateY(20px);
  background: #020617;
  color: white;
  padding: 13px 18px;
  border-radius: 16px;
  opacity: 0;
  pointer-events: none;
  transition: .25s;
  box-shadow: 0 15px 40px rgba(0,0,0,.35);
  z-index: 999;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media(max-width: 980px) {
  .wrap {
    grid-template-columns: 1fr;
  }

  .right {
    position: static;
  }
}

@media(max-width: 680px) {
  body {
    padding: 14px;
  }

  .top {
    flex-direction: column;
    align-items: flex-start;
  }

  .top-right {
    width: 100%;
  }

  .date {
    text-align: left;
  }

  .stats,
  .grid,
  .actions,
  .footer-grid,
  .check-grid {
    grid-template-columns: 1fr;
  }

  .logo {
    width: 58px;
    height: 58px;
    font-size: 27px;
  }

  h1 {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="wrap">

  <section class="panel left">

    <div class="top">

      <div class="brand">
        <div class="logo">✨</div>

        <div>
          <h1>Shine Photo Studio</h1>
          <div class="sub">Premium Daily Report System</div>
        </div>
      </div>

      <div class="top-right">
        <div class="date" id="liveDate"></div>

        <button class="theme-btn" onclick="toggleTheme()">
          🌙 Light / Dark
        </button>
      </div>

    </div>

    <div class="stats">

      <div class="stat">
        <div class="label">Cash</div>
        <div class="value" id="statCash">Rp 0</div>
      </div>

      <div class="stat">
        <div class="label">QRIS</div>
        <div class="value" id="statQris">Rp 0</div>
      </div>

      <div class="stat">
        <div class="label">Total</div>
        <div class="value" id="statTotal">Rp 0</div>
      </div>

      <div class="stat">
        <div class="label">Session</div>
        <div class="value" id="statSession">0</div>
      </div>

    </div>

    <div class="grid">

      <div class="field">
        <label>Shift</label>
        <select id="shiftType">
          <option value="">Pilih Shift</option>
          <option value="Siang">Siang</option>
          <option value="Malam">Malam</option>
        </select>
      </div>

      <div class="field">
        <label>Tanggal Report</label>
        <input type="date" id="tanggalManual">
      </div>

      <div class="field full">
        <label>Nama Petugas</label>

        <div class="check-grid">

          <label class="check-item">
            <input type="checkbox" value="Wahdah" class="petugasCheck">
            <span>Wahdah</span>
          </label>

          <label class="check-item">
            <input type="checkbox" value="Ikoh" class="petugasCheck">
            <span>Ikoh</span>
          </label>

          <label class="check-item">
            <input type="checkbox" value="Nazwa" class="petugasCheck">
            <span>Nazwa</span>
          </label>

          <label class="check-item">
            <input type="checkbox" value="Asya" class="petugasCheck">
            <span>Asya</span>
          </label>

          <label class="check-item">
            <input type="checkbox" value="Anisa" class="petugasCheck">
            <span>Anisa</span>
          </label>

          <label class="check-item">
            <input type="checkbox" value="Lainnya" class="petugasCheck">
            <span>Lainnya</span>
          </label>

        </div>
      </div>

      <div class="field">
        <label>Cash</label>
        <div class="input-wrap">
          <span class="prefix">Rp</span>
          <input type="number" id="cash" class="money" placeholder="0">
        </div>
      </div>

      <div class="field">
        <label>QRIS</label>
        <div class="input-wrap">
          <span class="prefix">Rp</span>
          <input type="number" id="qris" class="money" placeholder="0">
        </div>
      </div>

      <div class="field">
        <label>Berapa Photo Box</label>
        <input type="number" id="photobox" placeholder="0">
      </div>

      <div class="field">
        <label>Berapa Photo Studio</label>
        <input type="number" id="studio" placeholder="0">
      </div>

      <div class="field full">
        <label>Catatan</label>
        <input type="text" id="catatan" placeholder="Opsional... contoh: stok kertas aman">
      </div>

    </div>

    <div class="actions">

      <button class="generate" onclick="generateReport()">
        Generate
      </button>

      <button class="copy" onclick="copyText()">
        Copy
      </button>

      <button class="wa" onclick="sendWA()">
        WhatsApp
      </button>

      <button class="reset" onclick="resetForm()">
        Reset
      </button>

    </div>

  </section>

  <aside class="panel right">

    <div class="preview-top">
      <h2>Preview Report</h2>
      <div class="pill">LIVE</div>
    </div>

    <div class="report">

      <div class="report-head">

        <div>
          <div class="report-title">Laporan Harian</div>
          <div class="report-sub">Shine Photo Studio</div>
        </div>

        <div style="font-size:26px">📋</div>

      </div>

      <pre id="output">✨ SHINE PHOTO STUDIO - REPORT HARIAN

Isi data lalu klik Generate.</pre>

      <div class="footer-grid">

        <div class="mini">
          <div class="small">Pendapatan</div>
          <div class="big" id="miniTotal">Rp 0</div>
        </div>

        <div class="mini">
          <div class="small">Session</div>
          <div class="big" id="miniSession">0 Session</div>
        </div>

      </div>

    </div>

  </aside>

</div>

<div class="toast" id="toast"></div>

<script>
function rupiah(n) {
  return 'Rp ' + Number(n || 0).toLocaleString('id-ID');
}

function updateDate() {
  const now = new Date();

  const tanggal = now.toLocaleDateString('id-ID', {
    weekday: 'long',
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  });

  const jam = now.toLocaleTimeString('id-ID', {
    hour: '2-digit',
    minute: '2-digit'
  });

  document.getElementById('liveDate').innerHTML = `${tanggal}<br>${jam} WIB`;
}

function formatTanggalIndonesia(dateValue) {
  const date = dateValue ? new Date(dateValue) : new Date();

  return date.toLocaleDateString('id-ID', {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');

  toast.textContent = msg;
  toast.classList.add('show');

  clearTimeout(window.toastTimer);

  window.toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2200);
}

function updateStats() {
  const cash = +document.getElementById('cash').value || 0;
  const qris = +document.getElementById('qris').value || 0;
  const photobox = +document.getElementById('photobox').value || 0;
  const studio = +document.getElementById('studio').value || 0;

  const total = cash + qris;
  const session = photobox + studio;

  document.getElementById('statCash').textContent = rupiah(cash);
  document.getElementById('statQris').textContent = rupiah(qris);
  document.getElementById('statTotal').textContent = rupiah(total);
  document.getElementById('statSession').textContent = session;

  document.getElementById('miniTotal').textContent = rupiah(total);
  document.getElementById('miniSession').textContent = session + ' Session';
}

function getPetugas() {
  const petugasChecked = [...document.querySelectorAll('.petugasCheck:checked')];

  return petugasChecked.length
    ? petugasChecked.map(x => x.value).join(', ')
    : '-';
}

function generateReport() {
  const shift = document.getElementById('shiftType').value || '-';
  const tanggalInput = document.getElementById('tanggalManual').value;
  const tanggal = formatTanggalIndonesia(tanggalInput);
  const petugas = getPetugas();

  const cash = +document.getElementById('cash').value || 0;
  const qris = +document.getElementById('qris').value || 0;
  const photobox = +document.getElementById('photobox').value || 0;
  const studio = +document.getElementById('studio').value || 0;

  const totalSession = photobox + studio;
  const total = cash + qris;

  const catatan = document.getElementById('catatan').value || '-';

  const report =
`✨ SHINE PHOTO STUDIO - REPORT HARIAN

Tanggal : ${tanggal}
Petugas : ${petugas}
Shift   : ${shift}

Cash    : ${rupiah(cash)}
QRIS    : ${rupiah(qris)}

Berapa Photo Box    : ${photobox}
Berapa Photo Studio : ${studio}
Total Session       : ${totalSession}

Total Pendapatan : ${rupiah(total)}

Catatan : ${catatan}

Terima kasih 🙏`;

  document.getElementById('output').textContent = report;

  updateStats();
  showToast('Report berhasil dibuat');
}

async function copyText() {
  const text = document.getElementById('output').textContent;

  try {
    await navigator.clipboard.writeText(text);
    showToast('Report berhasil dicopy');
  } catch (err) {
    const temp = document.createElement('textarea');
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);

    showToast('Report berhasil dicopy');
  }
}

function sendWA() {
  generateReport();

  const text = document.getElementById('output').textContent;
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;

  window.open(url, '_blank');
}

function toggleTheme() {
  document.body.classList.toggle('light');

  const mode = document.body.classList.contains('light') ? 'light' : 'dark';

  localStorage.setItem('themeMode', mode);
}

function resetForm() {
  document.getElementById('shiftType').value = '';
  document.getElementById('tanggalManual').value = '';
  document.getElementById('cash').value = '';
  document.getElementById('qris').value = '';
  document.getElementById('photobox').value = '';
  document.getElementById('studio').value = '';
  document.getElementById('catatan').value = '';

  document.querySelectorAll('.petugasCheck').forEach(item => {
    item.checked = false;
  });

  document.getElementById('output').textContent =
`✨ SHINE PHOTO STUDIO - REPORT HARIAN

Isi data lalu klik Generate.`;

  updateStats();
  showToast('Form berhasil direset');
}

function setTodayInput() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('tanggalManual').value = today;
}

function loadTheme() {
  const savedTheme = localStorage.getItem('themeMode');

  if (savedTheme === 'light') {
    document.body.classList.add('light');
  }
}

[
  'cash',
  'qris',
  'photobox',
  'studio'
].forEach(id => {
  document.getElementById(id).addEventListener('input', updateStats);
});

loadTheme();
setTodayInput();
updateDate();
updateStats();

setInterval(updateDate, 30000);
</script>

</body>
</html>
